{% set python_min = "3.10" %}
{% set name = "txl-notebook-editor" %}
{% set version = "0.3.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/txl_notebook_editor-{{ version }}.tar.gz
  sha256: 9c1e83b40bf9bc7432e7227b08ecbe60ac167c3abdab5396437e47655d5ae19e

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - txl =0.3.2
    - pycrdt >=0.10.9,<0.13.0
    - jupyter_ydoc >=3.0.2,<4.0.0

test:
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
  imports:
    - txl_notebook_editor

about:
  home: https://github.com/davidbrochart/jpterm/blob/main/plugins/notebook_editor
  summary: TXL plugin for a notebook editor
  dev_url: https://github.com/davidbrochart/jpterm/blob/main/plugins/notebook_editor
  license_file: LICENSE.txt
  license: MIT
  license_family: MIT

extra:
  recipe-maintainers:
    - davidbrochart
